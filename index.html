<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>libyanoshop - متجرك الإلكتروني</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    header { background: linear-gradient(135deg, #6b21a8, #9333ea); color: white; text-align: center; padding: 20px; font-size: 24px; }
    .container { padding: 20px; max-width: 800px; margin: auto; }
    h2 { text-align: center; margin: 30px 0; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
    .price { font-weight: bold; color: #6b21a8; font-size: 20px; margin: 10px 0; }
    .btn { display: inline-block; margin-top: 10px; padding: 12px 24px; background: #6b21a8; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    .btn:hover { background: #9333ea; }
    footer { text-align: center; padding: 20px; color: #666; }
  </style>
</head>
<body>
  <header>🛒 libyanoshop</header>
  <div class="container">
    <h2>منتجاتنا</h2>
    <div class="products">
      <div class="card">
        <img src="pump.jpg" alt="مضخة BBCE غاطسة">
        <h2>مضخة BBCE غاطسة 20HP - 15kW</h2>
        <p class="price">0.1 باي</p>
        <button class="btn" onclick="payWithPi()">ادفع بالباي 💜</button>
      </div>
    </div>
  </div>
  <footer>© 2025 libyanoshop - جميع الحقوق محفوظة</footer>

  <!-- كود الدفع بالباي -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    Pi.init({ 
      version: "2.0", 
      sandbox: true, // بعد التجربة ديرها false
      appId: "qftgrrm1cjcyxnqcxekkp05l2ud6pu" // Client ID متاعك
    })

    async function payWithPi() {
      try {
        const payment = await Pi.createPayment({
          amount: 0.1, // غير الرقم لسعر المنتج بالباي
          memo: "شراء من Libyano Shop", 
          metadata: { product: "مضخة BBCE 20HP" },
          onReadyForServerApproval: (paymentId) => {
            console.log("Approved:", paymentId);
          },
          onReadyForServerCompletion: (paymentId, txid) => {
            alert("تم الدفع بنجاح ✅");
          },
          onCancel: (paymentId) => { alert("تم الالغاء"); },
          onError: (error) => { alert("خطأ: " + error); }
        });
      } catch (err) {
        alert("افتح الموقع من تطبيق Pi Browser");
      }
    }
  </script>
</body>
</html>
