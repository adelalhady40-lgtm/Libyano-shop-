<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>libyanoshop - متجرك الإلكتروني</title>
  <style>
    body { 
      font-family: 'Tajawal', sans-serif; 
      background: #f5f7fa; 
      margin: 0; 
      color: #333;
    }
    header { 
      background: linear-gradient(135deg, #0ea5e9, #2563eb); 
      color: white; 
      padding: 25px; 
      text-align: center; 
      font-size: 24px; 
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .container { 
      padding: 20px; 
      max-width: 1000px; 
      margin: auto; 
    }
    h2 { text-align: center; margin: 30px 0; }
    .products { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
      gap: 20px; 
    }
    .card { 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
      padding: 15px; 
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-5px); }
    .card img { 
      width: 100%; 
      height: 200px; 
      object-fit: cover; 
      border-radius: 12px; 
    }
    .price { 
      font-weight: bold; 
      color: #2563eb; 
      font-size: 18px;
      margin: 8px 0;
    }
    .btn { 
      display: inline-block; 
      margin-top: 10px; 
      padding: 12px 20px; 
      background: #25D366; 
      color: white; 
      border-radius: 10px; 
      text-decoration: none; 
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>🛒 libyanoshop</header>
  <div class="container">
    <h2>أحدث المنتجات</h2>
    <div class="products">
      <div class="card">
        <img src="https://i.imgur.com/8Km9t7b.jpg" alt="سماعة">
        <h3>سماعة بلوتوث</h3>
        <p class="price">120 دينار</p>
        <a class="btn" href="https://wa.me/218919397317?text=نبي%20سماعة%20بلوتوث">اطلب واتساب</a>
      </div>
      <div class="card">
        <img src="https://i.imgur.com/2nCt3Sbl.jpg" alt="شاحن">
        <h3>شاحن سريع 20W</h3>
        <p class="price">85 دينار</p>
        <a class="btn" href="https://wa.me/218919397317?text=نبي%20شاحن%20سريع">اطلب واتساب</a>
      </div>
    </div>
  </div>
  <footer>© 2026 libyanoshop - جميع الحقوق محفوظة</footer>
</body>
</html>
