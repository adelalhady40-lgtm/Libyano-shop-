<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>libyanoshop - متجرك الإلكتروني</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; color: #333; }
    header { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; padding: 25px; text-align: center; font-size: 24px; font-weight: bold; }
    .container { padding: 20px; max-width: 1000px; margin: auto; }
    h2 { text-align: center; margin: 30px 0; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 15px; text-align: center; }
    .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; }
    .price { font-weight: bold; color: #2563eb; font-size: 20px; margin: 10px 0; }
    .btn { display: inline-block; margin-top: 10px; padding: 12px 20px; background: #25D366; color: white; border-radius: 10px; text-decoration: none; font-weight: bold; }
    footer { text-align: center; padding: 20px; margin-top: 40px; color: #777; font-size: 14px; }
  </style>
</head>
<body>
  <header>🛒 libyanoshop</header>
  <div class="container">
    <h2>أحدث المنتجات</h2>
    <div class="products">
      <div class="card">
        <img src="https://i.imgur.com/2391015057975914.jpeg" alt="مضخة غاطسة BBCE 20HP">
        <h3>مضخة غاطسة BBCE 20HP - 15kW</h3>
        <p>400V, 50Hz, 2850 دورة/دقيقة</p>
        <p class="price">5000 دينار ليبي</p>
        <a class="btn" href="https://wa.me/218919397317?text=السلام عليكم، نبي مضخة غاطسة BBCE 20HP">اطلب واتساب</a>
      </div>
    </div>
  </div>
  <footer>© 2026 libyanoshop</footer>
</body>
</html>
